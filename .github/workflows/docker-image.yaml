name: Docker Image CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t assignment:latest .

      - name: Create the container
        run: docker run -d --name applepie -p 8080:80 assignment:latest

      - name: Curl the website
        run: |
          sleep 5
          curl localhost:8080

  logs:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Docker logs
        run: docker logs applepie
